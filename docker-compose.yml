services:
  postgres:
    image: postgres:16-alpine
    container_name: justplay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-justplay}
      POSTGRES_USER: ${POSTGRES_USER:-justplay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-justplay}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-justplay} -d ${POSTGRES_DB:-justplay}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
